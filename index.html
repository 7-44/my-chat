<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>채팅방</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
  <div id="login-zone">
    <input type="text" id="nickname" placeholder="닉네임 입력">
    <button onclick="setNick()">입장하기</button>
  </div>
  
  <div id="chat-zone" style="display:none;">
    <h3 id="room-title">전체 채팅방</h3>
    <button onclick="location.reload()">전체방으로 나가기</button>
    <div id="chat" style="height:200px; overflow-y:scroll; border:1px solid #ccc; margin-bottom:10px;"></div>
    <input type="text" id="msg" placeholder="메시지 입력">
    <button onclick="send()">전송</button>
  </div>

  <script>
    // [!] 아래 본인의 파이어베이스 정보로 교체하세요!
    var config = { apiKey: "AIzaSyCFmQ-P45kilcVnex4av0H5WHteRqz6KPI", databaseURL: "https://my-chat-3931c-default-rtdb.firebaseio.com" };
    firebase.initializeApp(config);
    var db = firebase.database();
    
    var myNick = "";
    var currentRoom = "messages"; // 기본은 전체방

    function setNick() {
      myNick = document.getElementById('nickname').value;
      if(myNick) {
        document.getElementById('login-zone').style.display = 'none';
        document.getElementById('chat-zone').style.display = 'block';
        loadChat();
      }
    }

    function loadChat() {
      document.getElementById('chat').innerHTML = "";
      db.ref(currentRoom).on('child_added', function(data) {
        var p = document.createElement('p');
        // 닉네임 클릭하면 DM방으로 이동하는 링크 추가
        p.innerHTML = "<b style='cursor:pointer; color:blue;' onclick='enterDM(\""+data.val().name+"\")'>" + data.val().name + "</b>: " + data.val().text;
        document.getElementById('chat').appendChild(p);
      });
    }

    function send() {
      var val = document.getElementById('msg').value;
      db.ref(currentRoom).push({ name: myNick, text: val });
      document.getElementById('msg').value = '';
    }

    function enterDM(targetNick) {
      if(targetNick === myNick) return;
      var names = [myNick, targetNick].sort();
      currentRoom = "dm/" + names[0] + "_" + names[1];
      document.getElementById('room-title').innerText = targetNick + "님과 1:1 대화중";
      loadChat();
    }
  </script>
</body>
</html>
