<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat</title>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-database.js"></script>
</head>
<body>
  <div id="login"><input type="text" id="nick" placeholder="닉네임"><button onclick="login()">입장</button></div>
  <div id="main" style="display:none;">
    <h3 id="title">채팅</h3>
    <div id="chat" style="height:200px; overflow:scroll; border:1px solid #000; margin:5px 0;"></div>
    <input type="text" id="msg"><button onclick="send()">전송</button>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCFmQ-P45kilcVnex4av0H5WHteRqz6KPI",
      databaseURL: "https://my-chat-3931c-default-rtdb.firebaseio.com",
      projectId: "my-chat-3931c"
    });
    var db = firebase.database();
    var myNick;

    function login() {
      myNick = document.getElementById('nick').value;
      if(!myNick) return;
      document.getElementById('login').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      loadChat();
    }

    function loadChat() {
      // 100개까지만 로드하여 속도 최적화
      db.ref('messages').limitToLast(100).on('child_added', function(d) {
        var p = document.createElement('p');
        p.innerText = d.val().name + ": " + d.val().text;
        document.getElementById('chat').appendChild(p);
      });
    }

    function send() {
      var input = document.getElementById('msg');
      if(!input.value) return;
      
      // 아이폰 사파리를 위해 set으로 강제 전송
      var newMsgRef = db.ref('messages').push();
      newMsgRef.set({ name: myNick, text: input.value }, function(err) {
        if(err) alert("에러: " + err);
        else input.value = '';
      });
    }
  </script>
</body>
</html>
