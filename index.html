<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat</title>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.24.0/firebase-database.js"></script>
</head>
<body>
  <div id="login"><input type="text" id="nick" placeholder="닉네임"><button onclick="login()">입장</button></div>
  <div id="main" style="display:none;">
    <h3 id="title">전체 채팅</h3>
    <div id="users">접속자: <span id="list"></span></div>
    <button onclick="goPublic()">전체방</button>
    <div id="chat" style="height:150px; overflow:scroll; border:1px solid #ccc; margin:5px 0;"></div>
    <input type="text" id="msg"><button onclick="send()">전송</button>
  </div>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCFmQ-P45kilcVnex4av0H5WHteRqz6KPI",
      databaseURL: "https://my-chat-3931c-default-rtdb.firebaseio.com",
      projectId: "my-chat-3931c"
    });
    var db = firebase.database();
    var myNick, currentRoom = "messages";

    function login() {
      myNick = document.getElementById('nick').value;
      if(!myNick) return;
      document.getElementById('login').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      db.ref('users/' + myNick).set(true);
      loadUserList(); loadChat();
    }

    function loadUserList() {
      db.ref('users').on('value', function(s) {
        var html = "";
        s.forEach(function(c) { if(c.key !== myNick) html += "<button onclick='enterDM(\""+c.key+"\")'>"+c.key+"</button> "; });
        document.getElementById('list').innerHTML = html;
      });
    }

    function loadChat() {
      // 실시간 통신 연결 보장
      db.ref().off(); 
      document.getElementById('chat').innerHTML = "";
      db.ref(currentRoom).on('child_added', function(d) {
        var p = document.createElement('p');
        p.innerHTML = "<b>"+d.val().name+"</b>: "+d.val().text;
        document.getElementById('chat').appendChild(p);
      });
    }

    function send() {
      var msgInput = document.getElementById('msg');
      var val = msgInput.value;
      if(!val) return;
      
      // 메시지 저장
      db.ref(currentRoom).push({ name: myNick, text: val }, function(error) {
        if (!error) {
          msgInput.value = ''; // 전송 성공 시에만 초기화
        } else {
          alert("전송 실패: " + error.message);
        }
      });
    }

    function goPublic() { currentRoom = "messages"; document.getElementById('title').innerText = "전체 채팅"; loadChat(); }
    function enterDM(t) { var n = [myNick, t].sort(); currentRoom = "dm/"+n[0]+"_"+n[1]; document.getElementById('title').innerText = t+"와 대화중"; loadChat(); }
  </script>
</body>
</html>
